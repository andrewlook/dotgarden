version: '3.0'
os:
- macos
- linux
profiles:
- work
- home

# ---------------------------------------------------------------------------
# Registered categories — only needed when the real-world path is NOT
# ~/.config/<tool>/* or a root-level ~/.<dotfile>. The `.config/*` convention
# auto-discovers top-level children, so fish, ghostty, nvim, etc. don't need
# registry entries.
#
# Cursor's settings live at ~/Library/Application Support/Cursor/User/…
# — nowhere close to ~/.config/, and the space in the path is awkward. This
# is exactly the kind of thing the registry is for: map a clean repo path
# (`_cursor/`) to the ugly OS-specific location.
# ---------------------------------------------------------------------------
cursor:
  macos:
  - _cursor/settings.json: ~/Library/Application Support/Cursor/User/settings.json
  - _cursor/keybindings.json: ~/Library/Application Support/Cursor/User/keybindings.json
