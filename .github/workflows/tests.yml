name: Tests
on: [push, pull_request]

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch the examples/starter/ submodule → andrewlook/dotgarden-template
          # (public). Tests that touch the starter then see its real content
          # instead of an empty placeholder.
          submodules: true
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv run --python ${{ matrix.python-version }} --with pytest --with pyyaml python -m pytest tests/ -v

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Build test image
        run: docker build -f Dockerfile.test -t dotgarden-test .
      - name: Run integration harness
        run: docker run --rm dotgarden-test
